<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Authentification - Billetterie Premium</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="auth.css">
</head>
<body>
    <div class="auth-container">
        <!-- Logo -->
        <div class="auth-header">
            <a href="index.html" style="text-decoration: none; display: flex; align-items: center; justify-content: center;">
                <div class="logo-auth">
                    <i class="fas fa-ticket-alt"></i>
                    <span>Billetterie.com</span>
                </div>
            </a>
        </div>

        <!-- Login Form -->
        <div class="auth-form-wrapper" id="login-form-wrapper">
            <div class="form-header">
                <h1>Connexion</h1>
                <p>Accédez à votre compte</p>
            </div>

            <form class="auth-form" id="login-form">
                <div class="form-group">
                    <label for="login-email">
                        <i class="fas fa-envelope"></i> Email
                    </label>
                    <input type="email" id="login-email" name="email" placeholder="votre@email.com" required>
                </div>

                <div class="form-group">
                    <label for="login-password">
                        <i class="fas fa-lock"></i> Mot de passe
                    </label>
                    <div class="password-input-wrapper">
                        <input type="password" id="login-password" name="password" placeholder="••••••••" required>
                        <button type="button" class="password-toggle" onclick="togglePassword('login-password')"> <i class="fas fa-eye"></i>
                        </button>
                    </div>
                </div>

                <button type="submit" class="auth-button primary">
                    <i class="fas fa-sign-in-alt"></i> Se Connecter
                </button>
            </form>

            <div class="auth-divider">
                <span>Pas encore inscrit ?</span>
            </div>

            <button type="button" class="auth-button secondary" onclick="switchToRegister()">
                <i class="fas fa-user-plus"></i> Créer un Compte
            </button>

            <button type="button" class="auth-button guest">
                <i class="fas fa-eye"></i> Mode Visiteur
            </button>
        </div>

        <!-- Register Form -->
        <div class="auth-form-wrapper" id="register-form-wrapper" style="display: none;">
            <div class="form-header">
                <h1>Inscription</h1>
                <p>Rejoignez notre communauté</p>
            </div>

            <form class="auth-form" id="register-form">
                <div class="form-group">
                    <label for="register-name">
                        <i class="fas fa-user"></i> Nom Complet
                    </label>
                    <input type="text" id="register-name" name="name" placeholder="Jean Dupont" required>
                </div>

                <div class="form-group">
                    <label for="register-email">
                        <i class="fas fa-envelope"></i> Email
                    </label>
                    <input type="email" id="register-email" name="email" placeholder="votre@email.com" required>
                </div>

                <div class="form-group">
                    <label for="register-password">
                        <i class="fas fa-lock"></i> Mot de passe
                    </label>
                    <div class="password-input-wrapper">
                        <input type="password" id="register-password" name="password" placeholder="••••••••" required>
                        <button type="button" class="password-toggle" onclick="togglePassword('register-password')"> <i class="fas fa-eye"></i>
                        </button>
                    </div>
                </div>

                <div class="form-group">
                    <label for="register-confirm">
                        <i class="fas fa-lock"></i> Confirmer le mot de passe
                    </label>
                    <div class="password-input-wrapper">
                        <input type="password" id="register-confirm" name="confirm" placeholder="••••••••" required>
                        <button type="button" class="password-toggle" onclick="togglePassword('register-confirm')"> <i class="fas fa-eye"></i>
                        </button>
                    </div>
                </div>

                <div class="form-group">
                    <label for="register-role">
                        <i class="fas fa-user-tag"></i> Je suis...
                    </label>
                    <select id="register-role" name="role" required>
                        <option value="">-- Sélectionnez votre rôle --</option>
                        <option value="user">Visiteur / Client</option>
                        <option value="creator">Créateur d'Événement</option>
                    </select>
                </div>

                <div class="terms">
                    <input type="checkbox" id="terms" required>
                    <label for="terms">J'accepte les <a href="terms-conditions.html">conditions d'utilisation</a></label>
                </div>

                <button type="submit" class="auth-button primary">
                    <i class="fas fa-user-plus"></i> S'Inscrire
                </button>
            </form>

            <div class="auth-divider">
                <span>Vous avez un compte ?</span>
            </div>

            <button type="button" class="auth-button secondary" onclick="switchToLogin()">
                <i class="fas fa-sign-in-alt"></i> Se Connecter
            </button>
        </div>

        <!-- Footer -->
        <div class="auth-footer">
            <p>Billetterie Premium © 2026 | Tous droits réservés</p>
        </div>
    </div>

    <script src="auth.js"></script>
</body>
</html>
