<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vérification du Billet - Billetterie Premium</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="index.css">
    <style>
        .verify-container {
            min-height: 100vh;
            background: var(--dark-bg);
            padding: 40px 20px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .verify-card {
            background: var(--dark-card);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 40px;
            max-width: 600px;
            width: 100%;
            text-align: center;
            box-shadow: var(--shadow-lg);
        }

        .verify-header {
            margin-bottom: 30px;
        }

        .verify-icon {
            font-size: 48px;
            margin-bottom: 20px;
            animation: fadeIn 0.6s ease-in;
        }

        .verify-icon.success {
            color: #4CAF50;
        }

        .verify-icon.error {
            color: #ff3b3b;
        }

        .verify-title {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 12px;
            color: var(--text-primary);
        }

        .verify-description {
            color: var(--text-secondary);
            font-size: 14px;
            line-height: 1.6;
        }

        .verify-details {
            background: rgba(255, 59, 59, 0.05);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 20px;
            margin: 30px 0;
            text-align: left;
        }

        .detail-row {
            display: flex;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px solid var(--border-color);
        }

        .detail-row:last-child {
            border-bottom: none;
        }

        .detail-label {
            color: var(--text-secondary);
            font-weight: 600;
        }

        .detail-value {
            color: var(--text-primary);
            font-weight: 600;
        }

        .verify-button {
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
            color: white;
            border: none;
            padding: 14px 32px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 20px;
        }

        .verify-button:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-lg);
        }

        .loading-spinner {
            display: inline-block;
            width: 40px;
            height: 40px;
            border: 4px solid rgba(255, 59, 59, 0.2);
            border-top-color: var(--accent-primary);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 20px 0;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.8); }
            to { opacity: 1; transform: scale(1); }
        }

        .status-badge {
            display: inline-block;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 700;
            margin-top: 12px;
        }

        .status-badge.valid {
            background: rgba(76, 175, 80, 0.1);
            color: #4CAF50;
        }

        .status-badge.invalid {
            background: rgba(255, 59, 59, 0.1);
            color: #ff3b3b;
        }

        @media (max-width: 768px) {
            .verify-card {
                padding: 24px;
            }

            .verify-title {
                font-size: 22px;
            }
        }
    </style>
</head>
<body>
    <div class="verify-container">
        <div class="verify-card">
            <div class="verify-header">
                <div class="verify-icon" id="verify-icon">
                    <div class="loading-spinner"></div>
                </div>
                <h1 class="verify-title" id="verify-title">Vérification du Billet</h1>
                <p class="verify-description" id="verify-description">Veuillez patienter pendant la vérification de votre billet...</p>
            </div>

            <div class="verify-details" id="verify-details" style="display: none;">
                <div class="detail-row">
                    <span class="detail-label">Numéro de Billet:</span>
                    <span class="detail-value" id="ticket-id">-</span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">Nom:</span>
                    <span class="detail-value" id="ticket-name">-</span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">Email:</span>
                    <span class="detail-value" id="ticket-email">-</span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">Événement:</span>
                    <span class="detail-value" id="ticket-event">-</span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">Quantité:</span>
                    <span class="detail-value" id="ticket-quantity">-</span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">Statut:</span>
                    <span class="detail-value" id="ticket-status">-</span>
                </div>
            </div>

            <button class="verify-button" onclick="downloadTicket()" id="download-btn" style="display: none;">
                <i class="fas fa-download"></i> Télécharger le PDF
            </button>

            <button class="verify-button" onclick="goHome()">
                <i class="fas fa-home"></i> Retour à l'Accueil
            </button>
        </div>
    </div>

    <script src="index.js"></script>
    <script>
        // Get ticket info from URL parameters
        function verifyTicket() {
            const params = new URLSearchParams(window.location.search);
            const ticketId = params.get('ticket');
            const email = params.get('email');

            // Simulate ticket verification (in production: check against database)
            setTimeout(() => {
                const ticketInfo = sessionStorage.getItem('ticketInfo');
                
                if (ticketInfo) {
                    const data = JSON.parse(ticketInfo);
                    
                    // Verify ticket details
                    const isValid = data.ticketId === ticketId && data.email === email;
                    
                    displayTicketInfo(data, isValid);
                } else {
                    // Fallback: create a mock ticket info
                    const mockData = {
                        ticketId: ticketId,
                        email: email,
                        fullname: 'Utilisateur Visiteur',
                        event_title: 'Événement Premium',
                        quantity: 1,
                        total: 'Gratuit'
                    };
                    displayTicketInfo(mockData, true);
                }
            }, 1500);
        }

        function displayTicketInfo(data, isValid) {
            const icon = document.getElementById('verify-icon');
            const title = document.getElementById('verify-title');
            const description = document.getElementById('verify-description');
            const details = document.getElementById('verify-details');
            const downloadBtn = document.getElementById('download-btn');

            if (isValid) {
                // Valid ticket
                icon.innerHTML = '<i class="fas fa-check-circle verify-icon success"></i>';
                title.textContent = '✓ Billet Valide';
                description.innerHTML = 'Votre billet a été vérifié avec succès!<span class="status-badge valid">VALIDE</span>';
                downloadBtn.style.display = 'inline-block';
            } else {
                // Invalid ticket
                icon.innerHTML = '<i class="fas fa-times-circle verify-icon error"></i>';
                title.textContent = '✗ Billet Invalide';
                description.innerHTML = 'Ce billet n\'a pas pu être vérifié. Veuillez réessayer.<span class="status-badge invalid">INVALIDE</span>';
            }

            // Display ticket details
            document.getElementById('ticket-id').textContent = data.ticketId || '-';
            document.getElementById('ticket-name').textContent = data.fullname || '-';
            document.getElementById('ticket-email').textContent = data.email || '-';
            document.getElementById('ticket-event').textContent = data.event_title || '-';
            document.getElementById('ticket-quantity').textContent = `x${data.quantity || 1}`;
            document.getElementById('ticket-status').textContent = isValid ? 'Valide' : 'Invalide';
            
            details.style.display = 'block';

            // Store for download
            window.ticketData = data;
        }

        function downloadTicket() {
            if (window.ticketData) {
                alert('Téléchargement du billet en cours...\n(La fonctionnalité sera implémentée en production avec un serveur)');
            }
        }

        function goHome() {
            window.location.href = 'index.html';
        }

        // Initialize verification on page load
        document.addEventListener('DOMContentLoaded', () => {
            setupNavAuth();
            setupHamburgerMenu();
            verifyTicket();
        });
    </script>
</body>
</html>
