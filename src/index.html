<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Billetterie</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <!-- INTRO OVERLAY -->
  <div id="introOverlay" class="intro-overlay">
    <div class="intro-container">
      <video autoplay muted playsinline class="intro-video">
        <source src="videos/vid annimation.mp4" type="video/mp4">
      </video>
      <div class="intro-text">Clic ou attente 3 secondes...</div>
    </div>
  </div>

  <!-- HEADER -->
  <header>
    <div class="header-content">
      <h1>Billetterie</h1>
      <div id="userStatus">Visiteur</div>
    </div>
  </header>

  <!-- MAIN CONTENT -->
  <main>
    <!-- AUTH SECTION -->
    <div id="authSection" class="auth-section">
      <button id="btnLogin">Connexion</button>
      <button id="btnRegister">Inscription</button>
    </div>

    <!-- FILTERS -->
    <section id="filtersSection">
      <h2>Filtrer par catégorie</h2>
      <div id="filters"></div>
    </section>

    <!-- EVENTS GRID -->
    <section>
      <h2>Événements</h2>
      <div id="eventsGrid" class="events-grid"></div>
    </section>
  </main>

  <!-- AUTH MODAL -->
  <div id="authModal" class="modal">
    <div class="modal-box">
      <button class="close-btn" onclick="closeModal()">×</button>
      <h2 id="authTitle">Connexion</h2>
      <form id="authForm">
        <div id="nomField" style="display:none;">
          <label>Nom complet</label>
          <input id="nomInput" type="text" placeholder="Votre nom">
        </div>
        <label>Email</label>
        <input id="emailInput" type="email" placeholder="Email" required>
        <label>Mot de passe</label>
        <input id="passwordInput" type="password" placeholder="Mot de passe" required>
        <button type="submit" id="authBtn">Se connecter</button>
      </form>
      <div id="toggleMode" class="link">Pas de compte ? S'inscrire</div>
    </div>
  </div>

  <!-- CHECKOUT MODAL -->
  <div id="checkoutModal" class="modal">
    <div class="modal-box">
      <button class="close-btn" onclick="closeCheckout()">×</button>
      <h2>Acheter des tickets</h2>
      <form id="checkoutForm">
        <label>Type de ticket</label>
        <select id="ticketType" required></select>
        <label>Quantité</label>
        <input id="quantité" type="number" min="1" value="1" required>
        <div id="totalPrice" class="price-info">Total: 0 €</div>
        <button type="submit">Acheter</button>
      </form>
    </div>
  </div>

  <script src="js/app.js"></script>
</body>
</html>
