<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Billetterie - Événements Premium</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="index.css">
</head>
<body>
    <!-- SCREEN WITH VIDEO -->
    <div class="splash-screen" id="splash-screen">
        <video class="splash-video" id="splash-video" src="src/videos/billeterie.mp4" autoplay muted></video>
        <div class="splash-overlay"></div>
    </div>

    <!-- NAVIGATION -->
    <header class="navbar">
        <div class="navbar-content">
            <div class="logo-container">
                <img src="/images/logo.jpg" alt="Logo" class="logo">
                <span class="brand-name">Billetterie.com</span>
            </div>
            
            <nav class="nav-links">
                <a href="index.html" class="nav-item active">Accueil</a>
                <a href="my-tickets.html" class="nav-item">Mes Billets</a>
                <a href="contact.html" class="nav-item">Contact</a>
            </nav>

            <button class="mobile-menu" id="mobile-menu">
                <span></span>
                <span></span>
                <span></span>
            </button>
        </div>
    </header>

    <!-- MOBILE NAV -->
    <nav class="mobile-nav" id="mobile-nav">
        <a href="index.html" class="mobile-nav-item">Accueil</a>
        <a href="my-tickets.html" class="mobile-nav-item">Mes Billets</a>
        <a href="contact.html" class="mobile-nav-item">Contact</a>
    </nav>

    <!-- HERO SECTION -->
    <section class="hero">
        <div class="hero-background">
            <div class="hero-gradient"></div>
            <div class="hero-overlay"></div>
        </div>
        
        <div class="hero-content">
            <h1 class="hero-title">Découvrez des Expériences Inoubliables</h1>
            <p class="hero-subtitle">Concerts, festivals, spectacles — tout ce qui vous fait vivre intensément</p>
            <button class="hero-cta" id="hero-cta-btn">Explorer les événements</button>
        </div>
    </section>

    <!-- FILTERS SECTION -->
    <section class="filters-section">
        <div class="filters-container">
            <h2 class="filters-title">Affinez votre recherche</h2>
            
            <div class="filters-wrapper">
                <div class="filter-group">
                    <label class="filter-label">Villes</label>
                    <div class="chips-container" id="cities-chips">
                        <!-- Dynamically populated -->
                    </div>
                </div>

                <div class="filter-group">
                    <label class="filter-label">Catégories</label>
                    <div class="chips-container" id="categories-chips">
                        <!-- Dynamically populated -->
                    </div>
                </div>
            </div>

            <button class="reset-btn" id="reset-filters">
                <i class="fas fa-redo-alt"></i> Réinitialiser
            </button>
        </div>
    </section>

    <!-- EVENTS GRID -->
    <section class="events-section">
        <div class="events-container">
            <div class="events-grid" id="events-grid">
                <div class="loading-state">
                    <div class="spinner"></div>
                    <p>Chargement des événements...</p>
                </div>
            </div>
        </div>
    </section>

    <!-- MODAL -->
    <div class="modal" id="event-modal">
        <div class="modal-content">
            <button class="modal-close" id="modal-close">
                <i class="fas fa-times"></i>
            </button>
            <div id="modal-body">
                <!-- Event details populated here -->
            </div>
        </div>
    </div>

   

    <!-- FOOTER -->
    <footer class="footer">
        <div class="footer-content">
            <p>&copy; 2026 Billetterie. Événements Premium au Maroc.</p>
        </div>
    </footer>

    <script src="index.js"></script>
</body>
</html>
