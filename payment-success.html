<!DOCTYPE html>
<html lang="fr">
<head>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="index.css">
    <link rel="stylesheet" href="payment-success.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<body>
    <!-- NAVIGATION -->
    <header class="navbar">
        <div class="navbar-content">

            <div class="navbar-left">
                <a href="index.html" style="text-decoration: none; display: flex; align-items: center;">
                    <div class="logo-container">
                        <img src="src/image/logo.jpg" alt="Logo" class="logo">
                        <span class="brand-name">Billetterie.com</span>
                    </div>
                </a>
            </div>

            <!-- NAVBAR CENTER: ALL LINKS -->
            <nav class="navbar-center">
                <a href="index.html" class="nav-item">Accueil</a>
                <a href="my-tickets.html" class="nav-item">Mes Billets</a>
                <a href="contact.html" class="nav-item">Contact</a>
            </nav>

            <!-- NAVBAR RIGHT -->
            <div class="navbar-right">
                <div class="nav-auth" id="nav-auth">
                    <!-- Will be populated by JavaScript -->
                    <a href="auth.html" class="login-btn">
                        <i class="fas fa-sign-in-alt"></i> Se Connecter

                </div>

                <button class="mobile-menu" id="mobile-menu">
                <span></span>
                <span></span>
                <span></span>

        </div>

    <nav class="mobile-nav" id="mobile-nav">
        <a href="index.html" class="mobile-nav-item">Accueil</a>
        <a href="my-tickets.html" class="mobile-nav-item">Mes Billets</a>
        <a href="contact.html" class="mobile-nav-item">Contact</a>
        <div class="mobile-nav-divider"></div>
        <div id="mobile-nav-auth" style="padding: 12px 16px;">
            <!-- Will be populated by JavaScript -->
        </div>
    </nav>

            <div class="loading-state">
                <div class="spinner"></div>
                <p>Traitement de votre confirmation...</p>
            </div>
        </div>
    </section>

    <!-- FOOTER -->
    <footer class="footer">
        <div class="footer-content">
            <p>&copy; 2026 Billetterie. Événements Premium au Maroc.</p>
            <div class="footer-credits">
                <a href="terms-conditions.html" style="color: var(--accent-primary); text-decoration: none; margin: 0 12px;">Conditions d'Utilisation</a>
                |
                <a href="contact.html" style="color: var(--accent-primary); text-decoration: none; margin: 0 12px;">Contact</a>

        </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="payment-success.js"></script>
    <script src="index.js"></script>
    <script>
        // Setup navigation auth and hamburger menu for this page
        document.addEventListener('DOMContentLoaded', () => {
            setupNavAuth();
            setupHamburgerMenu();
        });
