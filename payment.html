    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

</head>
<body>
    <!-- NAVIGATION -->
    <header class="navbar">
        <div class="navbar-content">
            <div class="logo-container">
                <a href="index.html" style="display: flex; align-items: center; gap: 12px; text-decoration: none;">
                    <img src="src/image/logo.jpg" alt="Logo" class="logo">
                    <span class="brand-name">Billetterie.com</span>
                </a>
            </div>
            
            <nav class="nav-links">
                <a href="index.html" class="nav-item">Accueil</a>
                <a href="my-tickets.html" class="nav-item">Mes Billets</a>

    <nav class="mobile-nav" id="mobile-nav">

    </nav>

    <section class="payment-section">

            <div class="payment-header">
                <a href="javascript:history.back()" class="back-button">

                </a>

            <div class="payment-content" id="payment-content">

    <!-- FOOTER -->
    <footer class="footer">
        <div class="footer-content">
            <p>&copy; 2026 Billetterie. Événements Premium au Maroc.</p>
        </div>
